name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [synchronize, opened, reopened]
  push:
    branches: [main]
    tags:
      - 'v*'
  schedule:
    # additionally run once per week (At 00:00 on Sunday) to maintain cache
    - cron: '0 0 * * 0'

jobs:
  stack:
    name: ghc ${{ matrix.ghc }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        stack: ["3.1.1"]
        ghc: ["9.10.3"]
        os: ["ubuntu-latest", "windows-2022"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v7

    - name: Install Linux dependencies
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        sudo apt-get install nodejs zlib1g-dev libglew-dev librocksdb-dev
        sudo apt-get install libxxf86vm-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev

    - uses: haskell-actions/setup@v2.11.0
      name: Setup Haskell Stack
      with:
        ghc-version: ${{ matrix.ghc }}
        stack-version: ${{ matrix.stack }}

    - name: Install Windows dependencies
      if: ${{ matrix.os == 'windows-2022' }}
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          mingw-w64-clang-x86_64-rocksdb
          mingw-w64-clang-x86_64-tools-git

    - name: Generate RocksDB import library for Windows
      if: ${{ matrix.os == 'windows-2022' }}
      shell: msys2 {0}
      run: |
        cd "$MSYSTEM_PREFIX/bin"
        gendef librocksdb.dll
        llvm-dlltool -D librocksdb.dll -d librocksdb.def -l "$MSYSTEM_PREFIX/lib/librocksdb.dll.a"

    - name: Set Windows extra stack flags
      if: ${{ matrix.os == 'windows-2022' }}
      shell: msys2 {0}
      run: |
        WIN_PREFIX=$(cygpath -m "$MSYSTEM_PREFIX")
        echo "STACK_FLAGS=--extra-lib-dirs=${WIN_PREFIX}/lib --extra-lib-dirs=${WIN_PREFIX}/bin --extra-include-dirs=${WIN_PREFIX}/include" >> $GITHUB_ENV

    - uses: actions/cache@v5.0.5
      if: ${{ matrix.os == 'ubuntu-latest' }}
      name: Cache ~/.stack
      with:
        path: ~/.stack
        key: ${{ runner.os }}-${{ matrix.ghc }}-stack

    - name: Install Haskell dependencies
      run: |
        stack build --system-ghc --test --bench --no-run-tests --no-run-benchmarks --only-dependencies ${{ env.STACK_FLAGS }}

    - name: Build
      run: |
        stack build --system-ghc --test --bench --no-run-tests --no-run-benchmarks ${{ env.STACK_FLAGS }}

    - name: Test
      # Running the tests only on Linux should suffice
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        stack test --system-ghc

    - name: Build release
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        stack exec --system-ghc -- bash tools/win_make_archive.sh

    - name: Upload release
      if: startsWith(github.ref, 'refs/tags/v')
      id: upload-release-asset
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: ${{ matrix.os == 'ubuntu-latest' && 'lamdu-*-linux.tgz' || 'lamdu-*-win-setup.exe' }}

  hlint:
    name: hlint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Run HLint
      env:
         HLINT_VERSION: "3.6.1"
      run: |
        curl -L https://github.com/ndmitchell/hlint/releases/download/v${HLINT_VERSION}/hlint-${HLINT_VERSION}-x86_64-linux.tar.gz --output hlint.tar.gz
        tar -xvf hlint.tar.gz
        ./hlint-${HLINT_VERSION}/hlint src/ test/

  nix-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            extra-substituters = https://cache.iog.io
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ=
            allow-import-from-derivation = true
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-v4-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-v4-${{ runner.os }}-${{ runner.arch }}

      - name: "Build Nix Flake"
        run: nix build
